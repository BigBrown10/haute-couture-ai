# Cloud Build CI/CD — Auto-deploy to Cloud Run on push to main
#
# This file is used by the Cloud Build GitHub trigger.
# It builds the Docker container and deploys to Cloud Run.
#
# Required substitutions:
#   _SERVICE_NAME: haute-couture-backend
#   _REGION: us-central1
#   _GEMINI_API_KEY: (set as a secret in Cloud Build)

steps:
  # Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--port'
      - '3001'
      - '--session-affinity'
      - '--timeout'
      - '3600'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'

substitutions:
  _SERVICE_NAME: haute-couture-backend
  _REGION: us-central1
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY
